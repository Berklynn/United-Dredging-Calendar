<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Dredging — Social Media Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}
.topbar{background:#1a1a2e;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo{width:40px;height:40px;background:#0073ea;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar h1{color:#fff;font-size:17px;font-weight:700;}
.topbar p{color:#8892b0;font-size:13px;}
.nav-btns{display:flex;align-items:center;gap:8px;}
.nav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
.nav-btn:hover{background:rgba(255,255,255,0.15);}
.month-label{color:#fff;font-size:16px;font-weight:700;min-width:160px;text-align:center;}
.toggles-bar{background:#fff;border-bottom:1px solid #e8eaf0;padding:12px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toggles-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}
.tog{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;user-select:none;}
.tog.on{border-color:currentColor;}
.tog.off{opacity:.38;border-color:transparent;background:#f4f5f7!important;color:#aaa!important;}
.tog .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}
.special-bar{background:#f8f9fc;border-bottom:1px solid #e8eaf0;padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.special-bar-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}
.add-special-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px dashed;transition:all 0.15s;background:transparent;font-family:'DM Sans',sans-serif;}
.add-special-btn:hover{opacity:.8;}
.cal-wrap{padding:24px 28px;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:6px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{background:#fff;border-radius:10px;min-height:120px;padding:8px;border:1px solid #e8eaf0;position:relative;}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day.today{border:2px solid #0073ea;}
.day-num{font-size:12px;font-weight:600;color:#888;margin-bottom:5px;}
.cal-day.today .day-num{color:#0073ea;}
.post-pill{border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:opacity 0.15s;}
.post-pill:hover{opacity:.8;}
.post-pill-label{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-pill-sub{font-size:9px;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;}
.modal-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;display:inline-block;}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#888;line-height:1;padding:0;}
.modal-date{font-size:13px;color:#888;margin-top:4px;}
.modal h2{font-size:18px;font-weight:700;color:#1a1a2e;}
.modal-section{margin-top:16px;}
.modal-section label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
.caption-box{background:#f8f9fc;border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:#1a1a2e;border:1px solid #e8eaf0;min-height:80px;}
.platforms-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.plat-chip{padding:4px 10px;background:#f0f2f5;border-radius:20px;font-size:11px;font-weight:600;color:#555;}
.cap-counter{font-size:11px;color:#aaa;margin-top:6px;text-align:right;}
.copy-btn{margin-top:12px;width:100%;padding:10px;background:#0073ea;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
.copy-btn:hover{background:#005ec7;}
.copy-btn.copied{background:#00c875;}
.regen-btn{margin-top:8px;width:100%;padding:10px;background:#fff;color:#0073ea;border:1.5px solid #0073ea;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.regen-btn:hover{background:#f0f7ff;}
.del-btn{margin-top:8px;width:100%;padding:10px;background:#fff;color:#e2445c;border:1.5px solid #e2445c;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.del-btn:hover{background:#fdedf0;}
.media-zone{border:1.5px dashed #d0d7e5;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-top:6px;position:relative;}
.media-zone:hover{border-color:#0073ea;background:#f5f9ff;}
.media-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.media-zone-label{font-size:13px;color:#888;pointer-events:none;}
.media-zone-label span{display:block;font-size:20px;margin-bottom:4px;}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.media-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f2f5;}
.media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover;}
.media-thumb-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.media-filename{font-size:10px;color:#555;text-align:center;padding:4px 4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dl-btn{margin-top:8px;width:100%;padding:10px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
.dl-btn:hover{background:#2d2d4e;}
.dl-btn:disabled{background:#ccc;cursor:default;}
.media-count{font-size:11px;color:#0073ea;font-weight:600;margin-top:6px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e0e3eb;font-size:13px;font-family:'DM Sans',sans-serif;color:#1a1a2e;outline:none;transition:border 0.2s;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#0073ea;}
.form-group textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.submit-btn{width:100%;padding:11px;background:#0073ea;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
.submit-btn:hover{background:#005ec7;}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:0 28px 16px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666;}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" stroke="white" stroke-width="2"/><path d="M3 9h18M8 2v4M16 2v4" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div>
      <h1>United Dredging — Social Media Calendar</h1>
      <p>Click any post to view and copy the caption</p>
    </div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592; Prev</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">Next &#8594;</button>
  </div>
</div>

<div class="toggles-bar" id="toggles-bar"><span class="toggles-label">Post types:</span></div>

<div class="special-bar">
  <span class="special-bar-label">Add:</span>
  <button class="add-special-btn" style="color:#e91e8c;border-color:#e91e8c;" onclick="openAddModal('birthday')">&#127874; Birthday</button>
  <button class="add-special-btn" style="color:#7c4dff;border-color:#7c4dff;" onclick="openAddModal('anniversary')">&#127942; Work Anniversary</button>
  <button class="add-special-btn" style="color:#00897b;border-color:#00897b;" onclick="openAddModal('corevalue')">&#11088; Core Value Nominee</button>
</div>

<div class="legend" id="legend"></div>

<div class="cal-wrap">
  <div class="cal-header">
    <div class="cal-dow">Sun</div><div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
    <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div><div class="cal-dow">Fri</div>
    <div class="cal-dow">Sat</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- View/Edit Caption Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeCaptionModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div id="modal-badge" class="modal-badge"></div>
        <h2 id="modal-title" style="margin-top:8px;"></h2>
        <div class="modal-date" id="modal-date"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modal-bg').classList.remove('open')">&#215;</button>
    </div>
    <div id="modal-platforms-wrap" class="modal-section">
      <label>Platforms</label>
      <div class="platforms-row" id="modal-platforms"></div>
    </div>
    <div class="modal-section">
      <label>Caption</label>
      <div class="caption-box" id="modal-caption"></div>
      <div class="cap-counter" id="cap-counter"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyCaption()">Copy caption</button>
      <button class="regen-btn" id="regen-btn" onclick="regenCaption()">&#8635; Generate new caption</button>
      <button class="del-btn" id="del-btn" style="display:none;" onclick="deleteSpecial()">&#128465; Remove this post</button>
    </div>
    <div class="modal-section">
      <label>Attach media <span style="font-weight:400;text-transform:none;font-size:11px;color:#aaa;">(photos &amp; videos for this post)</span></label>
      <div class="media-zone" id="media-zone">
        <input type="file" id="media-input" multiple accept="image/*,video/*" onchange="handleMediaUpload(event)">
        <div class="media-zone-label"><span>&#128247;</span>Drop files here or click to upload<br><span style="font-size:11px;color:#bbb;">JPG, PNG, GIF, MP4, MOV supported</span></div>
      </div>
      <div class="media-count" id="media-count" style="display:none;"></div>
      <div class="media-grid" id="media-grid"></div>
      <button class="dl-btn" id="dl-btn" onclick="downloadPost()" disabled>&#8595; Download post package</button>
    </div>
  </div>
</div>

<!-- Add Special Post Modal -->
<div class="modal-bg" id="add-modal-bg" onclick="closeAddModal(event)">
  <div class="modal" id="add-modal">
    <div class="modal-header">
      <div>
        <div id="add-modal-badge" class="modal-badge"></div>
        <h2 id="add-modal-title" style="margin-top:8px;"></h2>
      </div>
      <button class="modal-close" onclick="document.getElementById('add-modal-bg').classList.remove('open')">&#215;</button>
    </div>
    <div id="add-modal-body"></div>
  </div>
</div>

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let curMonth=new Date().getMonth(),curYear=new Date().getFullYear();
let captionOverrides=JSON.parse(localStorage.getItem('ud_captionOverrides')||'{}');
let specialPosts=JSON.parse(localStorage.getItem('ud_specialPosts')||'{}');
let _savedTypes=JSON.parse(localStorage.getItem('ud_activeTypes')||'null');
let activeTypes=new Set(_savedTypes||TYPES.map(t=>t.key));
let modalPost=null,modalIsSpecial=false;
let currentAddType=null;
function saveState(){
  localStorage.setItem('ud_captionOverrides',JSON.stringify(captionOverrides));
  localStorage.setItem('ud_specialPosts',JSON.stringify(specialPosts));
  localStorage.setItem('ud_activeTypes',JSON.stringify([...activeTypes]));
}

function storageKey(year,month){return `${year}-${month}`;}
function getSpecials(year,month){return specialPosts[storageKey(year,month)]||[];}
function setSpecials(year,month,arr){specialPosts[storageKey(year,month)]=arr;}

function getCapIdx(year,month,typeKey){
  const k=`${year}-${month}-${typeKey}`;
  if(captionOverrides[k]!==undefined)return captionOverrides[k];
  return(year*12+month+TYPES.findIndex(t=>t.key===typeKey))%25;
}

function regenCaption(){
  if(modalIsSpecial){
    const specials=getSpecials(modalPost.year,modalPost.month);
    const sp=specials.find(s=>s.id===modalPost.id);
    if(!sp)return;
    const st=SPECIAL_TYPES[sp.type];
    const caps=st.captionFn(sp.name,sp.extra);
    sp.capIdx=((sp.capIdx||0)+1)%caps.length;
    setSpecials(modalPost.year,modalPost.month,specials);saveState();
    document.getElementById('modal-caption').textContent=caps[sp.capIdx];
    document.getElementById('cap-counter').textContent=`Caption ${sp.capIdx+1} of ${caps.length}`;
    return;
  }
  const t=TYPES.find(x=>x.key===modalPost.typeKey);
  const k=`${modalPost.year}-${modalPost.month}-${modalPost.typeKey}`;
  captionOverrides[k]=((getCapIdx(modalPost.year,modalPost.month,modalPost.typeKey)+1)%t.captions.length);saveState();
  document.getElementById('modal-caption').textContent=t.captions[captionOverrides[k]];
  document.getElementById('cap-counter').textContent=`Caption ${captionOverrides[k]+1} of ${t.captions.length}`;
  const b=document.getElementById('copy-btn');b.textContent='Copy caption';b.classList.remove('copied');
}

function copyCaption(){
  navigator.clipboard.writeText(document.getElementById('modal-caption').textContent).then(()=>{
    const b=document.getElementById('copy-btn');b.textContent='Copied!';b.classList.add('copied');
    setTimeout(()=>{b.textContent='Copy caption';b.classList.remove('copied');},2000);
  });
}

function deleteSpecial(){
  if(!modalIsSpecial)return;
  const specials=getSpecials(modalPost.year,modalPost.month).filter(s=>s.id!==modalPost.id);
  setSpecials(modalPost.year,modalPost.month,specials);saveState();
  document.getElementById('modal-bg').classList.remove('open');
  renderCalendar();
}

function openCaptionModal(post,isSpecial){
  modalPost=post;modalIsSpecial=isSpecial||false;
  const delBtn=document.getElementById('del-btn');
  const regenBtn=document.getElementById('regen-btn');
  delBtn.style.display=isSpecial?'block':'none';
  if(isSpecial){
    const specials=getSpecials(post.year,post.month);
    const sp=specials.find(s=>s.id===post.id);
    const st=SPECIAL_TYPES[sp.type];
    const caps=st.captionFn(sp.name,sp.extra);
    const idx=sp.capIdx||0;
    document.getElementById('modal-badge').textContent=st.label;
    document.getElementById('modal-badge').style.background=st.bg;
    document.getElementById('modal-badge').style.color=st.text;
    document.getElementById('modal-title').textContent=sp.type==='birthday'?`Birthday: ${sp.name}`:sp.type==='anniversary'?`Anniversary: ${sp.name}`:`Core Value: ${sp.name}`;
    document.getElementById('modal-date').textContent=post.dateStr;
    document.getElementById('modal-caption').textContent=caps[idx];
    document.getElementById('cap-counter').textContent=`Caption ${idx+1} of ${caps.length}`;
    document.getElementById('modal-platforms').innerHTML=st.platforms.map(p=>`<span class="plat-chip">${p}</span>`).join('');
  } else {
    const t=TYPES.find(x=>x.key===post.typeKey);
    const idx=getCapIdx(post.year,post.month,post.typeKey);
    document.getElementById('modal-badge').textContent=t.label;
    document.getElementById('modal-badge').style.background=t.bg;
    document.getElementById('modal-badge').style.color=t.text;
    document.getElementById('modal-title').textContent=t.label;
    document.getElementById('modal-date').textContent=post.dateStr;
    document.getElementById('modal-caption').textContent=t.captions[idx];
    document.getElementById('cap-counter').textContent=`Caption ${idx+1} of ${t.captions.length}`;
    document.getElementById('modal-platforms').innerHTML=t.platforms.map(p=>`<span class="plat-chip">${p}</span>`).join('');
  }
  const b=document.getElementById('copy-btn');b.textContent='Copy caption';b.classList.remove('copied');
  document.getElementById('modal-bg').classList.add('open');
  loadMediaForPost();
}

function closeCaptionModal(e){if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');}

function openAddModal(type){
  currentAddType=type;
  const st=SPECIAL_TYPES[type];
  document.getElementById('add-modal-badge').textContent=st.label;
  document.getElementById('add-modal-badge').style.background=st.bg;
  document.getElementById('add-modal-badge').style.color=st.text;
  document.getElementById('add-modal-title').textContent=type==='birthday'?'Add a Birthday':type==='anniversary'?'Add a Work Anniversary':'Add a Core Value Nominee';
  const body=document.getElementById('add-modal-body');
  const monthName=MONTHS[curMonth];
  if(type==='birthday'){
    body.innerHTML=`
      <div class="form-group"><label>Employee Name</label><input id="sp-name" type="text" placeholder="e.g. Sarah Johnson"></div>
      <div class="form-group"><label>Department / Role</label><input id="sp-role" type="text" placeholder="e.g. Equipment Operator"></div>
      <div class="form-group"><label>Birthday Date (in ${monthName})</label><input id="sp-day" type="number" min="1" max="31" placeholder="Day of month e.g. 14"></div>
      <button class="submit-btn" onclick="submitSpecial()">Add Birthday Post</button>`;
  } else if(type==='anniversary'){
    body.innerHTML=`
      <div class="form-group"><label>Employee Name</label><input id="sp-name" type="text" placeholder="e.g. Mike Torres"></div>
      <div class="form-group"><label>Years of Service</label><input id="sp-years" type="number" min="1" max="50" placeholder="e.g. 5"></div>
      <div class="form-group"><label>Anniversary Date (in ${monthName})</label><input id="sp-day" type="number" min="1" max="31" placeholder="Day of month e.g. 22"></div>
      <button class="submit-btn" onclick="submitSpecial()">Add Anniversary Post</button>`;
  } else {
    body.innerHTML=`
      <div class="form-group"><label>Nominee Name</label><input id="sp-name" type="text" placeholder="e.g. David Kim"></div>
      <div class="form-group"><label>Core Value Demonstrated</label><input id="sp-value" type="text" placeholder="e.g. Integrity, Teamwork, Safety..."></div>
      <div class="form-group"><label>Post Date (in ${monthName})</label><input id="sp-day" type="number" min="1" max="31" placeholder="Day of month e.g. 1"></div>
      <button class="submit-btn" onclick="submitSpecial()">Add Core Value Post</button>`;
  }
  document.getElementById('add-modal-bg').classList.add('open');
}

function closeAddModal(e){if(e.target===document.getElementById('add-modal-bg'))document.getElementById('add-modal-bg').classList.remove('open');}

function submitSpecial(){
  const name=(document.getElementById('sp-name')||{}).value||'';
  const day=parseInt((document.getElementById('sp-day')||{}).value||'0');
  if(!name.trim()||!day||day<1||day>31){alert('Please fill in all fields.');return;}
  let extra='';
  if(currentAddType==='birthday') extra=(document.getElementById('sp-role')||{}).value||'Team Member';
  else if(currentAddType==='anniversary') extra=(document.getElementById('sp-years')||{}).value||'1';
  else extra=(document.getElementById('sp-value')||{}).value||'Excellence';
  const d=new Date(curYear,curMonth,day);
  const dateStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const newPost={id:Date.now(),type:currentAddType,name:name.trim(),extra:extra.trim(),day,dateStr,capIdx:0};
  const arr=getSpecials(curYear,curMonth);
  arr.push(newPost);
  setSpecials(curYear,curMonth,arr);saveState();
  document.getElementById('add-modal-bg').classList.remove('open');
  renderCalendar();
}

function getFirstMonday(year,month){const d=new Date(year,month,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);return d;}

function buildPosts(year,month){
  const fm=getFirstMonday(year,month),posts={};
  for(let w=0;w<5;w++){
    TYPES.forEach(t=>{
      const d=new Date(fm);
      d.setDate(fm.getDate()+w*7+(t.day===1?0:t.day===2?1:t.day===3?2:t.day===4?3:t.day===5?4:t.day===6?5:6));
      if(d.getMonth()!==month)return;
      const day=d.getDate();if(!posts[day])posts[day]=[];
      posts[day].push({typeKey:t.key,dateStr:d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),year,month,day});
    });
  }
  return posts;
}

function renderCalendar(){
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  document.getElementById('month-label').textContent=`${MONTHS[curMonth]} ${curYear}`;
  const posts=buildPosts(curYear,curMonth);
  const specials=getSpecials(curYear,curMonth);
  specials.forEach(sp=>{
    const day=sp.day;if(!posts[day])posts[day]=[];
    posts[day].push({isSpecial:true,id:sp.id,typeKey:sp.type,dateStr:sp.dateStr,year:curYear,month:curMonth,day});
  });
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const today=new Date();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');
    const isToday=today.getDate()===d&&today.getMonth()===curMonth&&today.getFullYear()===curYear;
    cell.className='cal-day'+(isToday?' today':'');
    cell.innerHTML=`<div class="day-num">${d}</div>`;
    (posts[d]||[]).filter(p=>p.isSpecial||activeTypes.has(p.typeKey)).forEach(post=>{
      const pill=document.createElement('div');pill.className='post-pill';
      if(post.isSpecial){
        const sp=specials.find(s=>s.id===post.id);
        const st=SPECIAL_TYPES[sp.type];
        pill.style.background=st.bg;
        pill.innerHTML=`<div class="post-pill-label" style="color:${st.text}">${st.label}</div><div class="post-pill-sub" style="color:${st.text}">${sp.name}</div>`;
        pill.onclick=()=>openCaptionModal(post,true);
      } else {
        const t=TYPES.find(x=>x.key===post.typeKey);
        pill.style.background=t.bg;
        pill.innerHTML=`<div class="post-pill-label" style="color:${t.text}">${t.label}</div><div class="post-pill-sub" style="color:${t.text}">${t.platforms.join(', ')}</div>`;
        pill.onclick=()=>openCaptionModal(post,false);
      }
      cell.appendChild(pill);
    });
    grid.appendChild(cell);
  }
}

function buildToggles(){
  const bar=document.getElementById('toggles-bar'),leg=document.getElementById('legend');
  TYPES.forEach(t=>{
    const tog=document.createElement('span');
    tog.className='tog on';tog.style.background=t.bg;tog.style.color=t.text;
    tog.innerHTML=`<span class="dot"></span>${t.label}`;
    if(!activeTypes.has(t.key)){tog.classList.remove('on');tog.classList.add('off');}
    tog.onclick=()=>{
      if(activeTypes.has(t.key)){activeTypes.delete(t.key);tog.classList.remove('on');tog.classList.add('off');}
      else{activeTypes.add(t.key);tog.classList.add('on');tog.classList.remove('off');}
      saveState();renderCalendar();
    };
    bar.appendChild(tog);
    const li=document.createElement('div');li.className='leg-item';
    li.innerHTML=`<div class="leg-dot" style="background:${t.color}"></div><span>${t.label}</span>`;
    leg.appendChild(li);
  });
  Object.values(SPECIAL_TYPES).forEach(st=>{
    const li=document.createElement('div');li.className='leg-item';
    li.innerHTML=`<div class="leg-dot" style="background:${st.color}"></div><span>${st.label}</span>`;
    leg.appendChild(li);
  });
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}

buildToggles();renderCalendar();

let mediaFiles=JSON.parse(localStorage.getItem('ud_mediaFiles')||'{}');
function saveMedia(){try{localStorage.setItem('ud_mediaFiles',JSON.stringify(mediaFiles));}catch(e){console.warn('Media too large for localStorage, not saving:',e);}}

function getMediaKey(post,isSpecial){
  if(isSpecial)return `special-${post.id}`;
  return `${post.year}-${post.month}-${post.day}-${post.typeKey}`;
}

function handleMediaUpload(e){
  const files=Array.from(e.target.files);
  if(!modalPost)return;
  const key=getMediaKey(modalPost,modalIsSpecial);
  if(!mediaFiles[key])mediaFiles[key]=[];
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      mediaFiles[key].push({name:f.name,type:f.type,dataUrl:ev.target.result});
      saveMedia();renderMediaGrid(key);
    };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}

function renderMediaGrid(key){
  const grid=document.getElementById('media-grid');
  const count=document.getElementById('media-count');
  const dlBtn=document.getElementById('dl-btn');
  const files=mediaFiles[key]||[];
  grid.innerHTML='';
  if(files.length===0){count.style.display='none';dlBtn.disabled=true;return;}
  count.style.display='block';
  count.textContent=`${files.length} file${files.length>1?'s':''} attached`;
  dlBtn.disabled=false;
  files.forEach((f,i)=>{
    const cell=document.createElement('div');cell.className='media-thumb';
    const isVideo=f.type.startsWith('video/');
    if(isVideo){
      cell.innerHTML=`<video src="${f.dataUrl}" style="width:100%;height:100%;object-fit:cover;"></video>`;
    } else {
      cell.innerHTML=`<img src="${f.dataUrl}" alt="${f.name}">`;
    }
    const del=document.createElement('button');
    del.className='media-thumb-del';del.textContent='×';
    del.onclick=(ev)=>{ev.stopPropagation();mediaFiles[key].splice(i,1);saveMedia();renderMediaGrid(key);};
    cell.appendChild(del);
    const name=document.createElement('div');name.className='media-filename';name.textContent=f.name;
    cell.appendChild(name);
    grid.appendChild(cell);
  });
}

function loadMediaForPost(){
  if(!modalPost)return;
  const key=getMediaKey(modalPost,modalIsSpecial);
  renderMediaGrid(key);
}

async function downloadPost(){
  if(!modalPost)return;
  const key=getMediaKey(modalPost,modalIsSpecial);
  const files=mediaFiles[key]||[];
  const caption=document.getElementById('modal-caption').textContent;
  const title=document.getElementById('modal-title').textContent;
  const dateStr=document.getElementById('modal-date').textContent;

  if(typeof JSZip==='undefined'){alert('Loading download library... please try again in a moment.');return;}
  const zip=new JSZip();
  const folder=zip.folder(title.replace(/[^a-z0-9]/gi,'_').substring(0,40));
  folder.file('caption.txt',`${title}\n${dateStr}\n\n${caption}`);
  files.forEach((f,i)=>{
    const ext=f.name.split('.').pop();
    const base64=f.dataUrl.split(',')[1];
    folder.file(`media_${i+1}_${f.name}`,base64,{base64:true});
  });
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`UnitedDredging_${title.replace(/[^a-z0-9]/gi,'_').substring(0,40)}.zip`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
